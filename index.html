<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NAH SOVEREIGN DIAMOND TERMINAL</title>
    <style>
        body { 
            background-color: #0a0a0a; 
            color: #00ff41; 
            font-family: 'Courier New', Courier, monospace; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        .terminal { 
            border: 2px solid #333; 
            border-top: 15px solid #00ff41;
            background: #111;
            padding: 30px; 
            width: 90%; 
            max-width: 500px; 
            box-shadow: 10px 10px 0px #000; 
            position: relative; 
        }
        .header { 
            border-bottom: 1px dashed #00ff41; 
            padding-bottom: 10px; 
            margin-bottom: 20px; 
            text-align: left; 
            letter-spacing: 1px; 
        }
        .data-row { 
            display: flex; 
            justify-content: space-between; 
            margin: 15px 0; 
            font-size: 1.2rem; 
            border-bottom: 1px solid #222;
            padding-bottom: 5px;
        }
        .label { color: #888; text-transform: uppercase; font-size: 0.9rem; margin-top: 4px; }
        .value { font-weight: bold; text-shadow: 0 0 5px rgba(0,255,65,0.4); }
        .error-text { color: #ff0000; text-shadow: 0 0 5px rgba(255,0,0,0.4); }
        .status { 
            font-size: 0.8rem; 
            color: #ff9900; 
            margin-top: 25px; 
            text-align: right; 
        }
        a.btn { 
            display: block; 
            text-align: center; 
            background: transparent; 
            color: #00ff41; 
            text-decoration: none; 
            padding: 12px; 
            margin-top: 30px; 
            font-weight: bold; 
            text-transform: uppercase; 
            border: 1px solid #00ff41;
            transition: all 0.2s; 
        }
        a.btn:hover { 
            background: #00ff41; 
            color: #0a0a0a; 
            box-shadow: 0 0 15px #00ff41;
        }
        .scanline { 
            width: 100%; height: 100px; z-index: 10; position: absolute; left: 0; pointer-events: none; 
            background: linear-gradient(0deg, rgba(0,0,0,0) 0%, rgba(0,255,65,0.1) 50%, rgba(0,0,0,0) 100%); 
            animation: scanline 4s linear infinite; 
        }
        @keyframes scanline { 0% { top: -100px; } 100% { top: 100%; } }
    </style>
</head>
<body>
    <div class="terminal">
        <div class="scanline"></div>
        <div class="header">
            <h3 style="margin:0; color:#fff;">BRC ORACLE V1.0</h3>
            <div style="font-size: 0.7rem; color: #555; margin-top:5px;">[ DATA FINALITY: STRICT ]</div>
        </div>
        
        <div class="data-row">
            <span class="label">SATS / NAH:</span>
            <span class="value" id="sats-val">SYNCING...</span>
        </div>
        <div class="data-row">
            <span class="label">USD / NAH:</span>
            <span class="value" id="usd-val">SYNCING...</span>
        </div>
        <div class="data-row">
            <span class="label">VND / NAH:</span>
            <span class="value" id="vnd-val">SYNCING...</span>
        </div>
        <div class="data-row">
            <span class="label">GOLD (oz) / NAH:</span>
            <span class="value" id="gold-val">SYNCING...</span>
        </div>

        <div class="status" id="last-update">AWAITING DATALINK...</div>
        
        <!-- Nút bấm dẫn thẳng về thanh khoản Nexus/DotSwap theo link Thuyền trưởng cấp -->
        <a href="https://swap.on.nexus/#R_%E2%80%A2BTC_%E2%80%A2NAH%E2%80%A2SOVEREIGN%E2%80%A2DIAMOND" class="btn" target="_blank">LIQUIDITY PORTAL</a>
    </div>

    <script>
        const WORKER_PROXY = "https://misty-voice-3bd5.geminibrc9999-ba3.workers.dev/?api=";
        // Phân giải link frontend của cậu thành link cấu trúc API
        const DEX_API = "https://api.swap.on.nexus/api/v1/pools/R_BTC_NAH%E2%80%A2SOVEREIGN%E2%80%A2DIAMOND";
        const BTC_API = "https://api.coindesk.com/v1/bpi/currentprice.json";

        async function engageOracle() {
            try {
                // 1. Kéo giá BTC
                const btcRes = await fetch(BTC_API);
                const btcData = await btcRes.json();
                const btcUsd = btcData.bpi.USD.rate_float;

                // 2. Kéo dữ liệu thực từ Dex thông qua Bóng Ma
                const dexRes = await fetch(WORKER_PROXY + encodeURIComponent(DEX_API));
                if (!dexRes.ok) throw new Error("PROXY/API CONNECTION FAILED");
                
                const dexData = await dexRes.json();
                
                // Trích xuất giá trị thực từ cấu trúc API (Không dùng giá ảo)
                let nahBtcRate = dexData.price || (dexData.data && dexData.data.price);
                
                if (!nahBtcRate) {
                    throw new Error("INVALID DATA STRUCTURE");
                }
                
                // 3. Tính toán
                let satsVal = (nahBtcRate * 100000000).toFixed(2);
                let usdVal = (nahBtcRate * btcUsd).toFixed(4);
                let vndVal = Math.floor(usdVal * 25400).toLocaleString('vi-VN'); 
                let goldVal = (usdVal / 2350).toFixed(6);

                // 4. Kết xuất
                document.getElementById("sats-val").className = "value";
                document.getElementById("usd-val").className = "value";
                document.getElementById("vnd-val").className = "value";
                document.getElementById("gold-val").className = "value";

                document.getElementById("sats-val").innerText = satsVal + " SATS";
                document.getElementById("usd-val").innerText = "$" + usdVal;
                document.getElementById("vnd-val").innerText = vndVal + " ₫";
                document.getElementById("gold-val").innerText = goldVal + " oz";
                
                let now = new Date();
                document.getElementById("last-update").innerText = "LAST SYNC: " + now.toLocaleTimeString();
                document.getElementById("last-update").style.color = "#ff9900";

            } catch (error) {
                // KÍCH HOẠT TRẠNG THÁI BÁO LỖI CHÂN THỰC
                document.getElementById("sats-val").className = "value error-text";
                document.getElementById("usd-val").className = "value error-text";
                document.getElementById("vnd-val").className = "value error-text";
                document.getElementById("gold-val").className = "value error-text";

                document.getElementById("sats-val").innerText = "ERROR";
                document.getElementById("usd-val").innerText = "ERROR";
                document.getElementById("vnd-val").innerText = "ERROR";
                document.getElementById("gold-val").innerText = "ERROR";
                
                document.getElementById("last-update").innerText = "DATALINK ERROR: " + error.message;
                document.getElementById("last-update").style.color = "#ff0000";
            }
        }

        engageOracle();
        setInterval(engageOracle, 60000);
    </script>
</body>
</html>
